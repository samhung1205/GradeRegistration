<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成績登記 — 微積分助教成績系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
:root{--primary:#2c4a7c;--primary-light:#3a62a7;--accent:#4a90d9;--success:#28a745;--warning:#ffc107;--danger:#dc3545;--bg:#f4f6f9;--card-bg:#fff;--border:#dee2e6;--text:#333;--text-muted:#6c757d;--sidebar-w:220px;--header-h:56px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:'Noto Sans TC','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}ul{list-style:none}
.topbar{height:var(--header-h);background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.topbar .logo{font-size:1.1rem;font-weight:700;white-space:nowrap}.topbar .logo span{color:var(--accent)}
.topbar .ta-selector{margin-left:auto;display:flex;align-items:center;gap:.5rem;font-size:.88rem}
.topbar .ta-selector label{color:#c8d8ef;white-space:nowrap}
.topbar .ta-selector select{padding:4px 10px;border-radius:6px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:.88rem;cursor:pointer;outline:none}
.topbar .ta-selector select option{background:var(--primary)}
.ta-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(74,144,217,.25);border:1px solid rgba(74,144,217,.5);border-radius:20px;padding:2px 10px;font-size:.82rem;color:#aecfee}
.ta-badge::before{content:'👤';font-size:.9em}
.sidebar{width:var(--sidebar-w);background:#1e3560;position:fixed;top:var(--header-h);left:0;bottom:0;overflow-y:auto;padding:1.2rem 0;z-index:90}
.sidebar .nav-section{padding:.5rem 1rem .25rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#6888b5;margin-top:.5rem}
.sidebar .nav-item a{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.2rem;color:#b0c4e0;font-size:.9rem;border-left:3px solid transparent;transition:all .15s}
.sidebar .nav-item a:hover,.sidebar .nav-item a.active{background:rgba(74,144,217,.18);color:#fff;border-left-color:var(--accent);text-decoration:none}
.sidebar .nav-item a .icon{font-size:1rem;width:1.4rem;text-align:center}
.main-content{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:1.8rem 2rem;flex:1}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;padding-bottom:.8rem;border-bottom:2px solid var(--border)}
.page-header h1{font-size:1.4rem;font-weight:700;color:var(--primary)}.page-header .actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:1.4rem;margin-bottom:1.2rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:1rem;font-weight:600;color:var(--primary);margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;border-radius:6px;border:1px solid transparent;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-outline{background:transparent;color:var(--primary);border-color:var(--primary)}.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:.25rem .6rem;font-size:.8rem}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.9rem;background:var(--card-bg)}
thead tr{background:#f0f4fa}thead th{padding:.7rem 1rem;text-align:left;font-weight:600;color:var(--primary);border-bottom:2px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid #eef0f4;transition:background .1s}tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f5f8ff}tbody td{padding:.65rem 1rem;vertical-align:middle}
.table-empty{text-align:center;padding:3rem;color:var(--text-muted)}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-group label{font-size:.82rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.form-control{padding:.45rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:.9rem;color:var(--text);background:#fff;transition:border-color .15s,box-shadow .15s;font-family:inherit;width:100%}
.form-control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,144,217,.15)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card-bg);border-radius:10px;width:100%;max-width:400px;box-shadow:0 8px 30px rgba(0,0,0,.2);transform:translateY(20px);transition:transform .2s;overflow:hidden}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{background:var(--primary);color:#fff;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;font-weight:600}
.modal-close{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1;padding:0}
.modal-body{padding:1.4rem}.modal-footer{padding:1rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:.6rem;justify-content:flex-end}
#toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast{min-width:220px;max-width:340px;padding:.75rem 1rem;border-radius:8px;font-size:.88rem;font-weight:500;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.18);display:flex;align-items:center;gap:.5rem;animation:toast-in .25s ease}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--accent)}.toast.warning{background:#e09000}
@keyframes toast-in{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-primary{background:#dce8f8;color:var(--primary)}.badge-success{background:#d4edda;color:#155724}.badge-warning{background:#fff3cd;color:#856404}
.loading-mask{display:none;position:absolute;inset:0;background:rgba(255,255,255,.75);z-index:10;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary);border-radius:8px}
.loading-mask.show{display:flex}.spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
/* 成績頁專用 */
.assignment-info{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;padding:.8rem 1rem;background:#f0f4fa;border-radius:8px;margin-bottom:1rem;font-size:.9rem}
.info-label{color:var(--text-muted);font-size:.8rem}.info-val{font-weight:600}
.score-input{width:90px;text-align:center;padding:4px 8px;font-size:.95rem}
.note-input{width:200px;font-size:.88rem}
tr.saving td{opacity:.6}tr.saved td{background:#f0fff4!important}tr.error td{background:#fff0f0!important}
.progress-bar{height:8px;background:#e0e7ef;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);border-radius:4px;transition:width .4s}
.shortcut-hint{font-size:.78rem;color:var(--text-muted);padding:.4rem .8rem;background:#f8f9fa;border-radius:6px;border:1px solid var(--border)}
kbd{background:#e0e7ef;border-radius:3px;padding:1px 4px;font-size:.8em}
@media(max-width:768px){.sidebar{width:0;overflow:hidden}.main-content{margin-left:0;padding:1rem}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">📐 <span>微積分</span>助教成績系統</div>
  <div class="ta-selector">
    <label>目前助教：</label>
    <select id="ta-select">
      <option value="">— 請選擇 —</option>
      <option value="助教 A">助教 A</option>
      <option value="助教 B">助教 B</option>
    </select>
    <div class="ta-badge" id="ta-badge">未選擇</div>
  </div>
</header>

<nav class="sidebar">
  <div class="nav-section">主選單</div>
  <div class="nav-item"><a href="./index.html"><span class="icon">🏠</span>首頁總覽</a></div>
  <div class="nav-section">資料管理</div>
  <div class="nav-item"><a href="./students.html"><span class="icon">👥</span>學生名單</a></div>
  <div class="nav-item"><a href="./assignments.html"><span class="icon">📋</span>作業/小考</a></div>
  <div class="nav-section">成績作業</div>
  <div class="nav-item"><a href="./grades.html" class="active"><span class="icon">✏️</span>成績登記</a></div>
  <div class="nav-item"><a href="./query.html"><span class="icon">🔍</span>成績查詢</a></div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1>✏️ 成績登記</h1>
    <div class="actions">
      <span class="shortcut-hint"><kbd>Enter</kbd> 儲存並移至下一人 ｜ <kbd>Tab</kbd> 移至下一格</span>
    </div>
  </div>

  <!-- 選擇作業 -->
  <div class="card">
    <div class="card-title">① 選擇要登記成績的作業/小考</div>
    <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:220px;">
        <label>作業/小考</label>
        <select id="assignment-select" class="form-control" onchange="onAssignmentChange()">
          <option value="">— 請選擇 —</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;min-width:200px;">
        <label>班級篩選（可選）</label>
        <select id="class-filter" class="form-control" onchange="renderGradeTable()">
          <option value="">全部班級</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadGradeSheet()" style="margin-bottom:.3rem;">📋 載入成績表</button>
    </div>
  </div>

  <!-- 作業資訊列 -->
  <div id="assignment-info-bar" style="display:none;"></div>

  <!-- 進度 -->
  <div id="progress-section" style="display:none;" class="card" style="padding:.8rem 1.2rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;">
      <span style="font-size:.88rem;font-weight:600;">登記進度</span>
      <span id="progress-text" style="font-size:.82rem;color:var(--text-muted);"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- 成績輸入表 -->
  <div class="card" id="grade-table-card" style="padding:0;display:none;position:relative;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem .5rem;flex-wrap:wrap;gap:.5rem;">
      <div class="card-title" style="margin:0;" id="grade-table-title">成績輸入表</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <button class="btn btn-success" onclick="saveAllGrades()">💾 全部儲存</button>
        <button class="btn btn-outline" onclick="exportCurrentGrades()">📥 匯出 CSV</button>
      </div>
    </div>
    <div style="padding:0 1.2rem .8rem;">
      <input type="text" id="student-search" class="form-control" placeholder="🔍 搜尋學生..." oninput="renderGradeTable()" style="max-width:300px;" />
    </div>
    <div class="loading-mask" id="loading"><div class="spinner"></div> 載入中...</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>學號</th><th>姓名</th><th>班級</th><th style="width:110px;">分數</th><th style="width:220px;">備註</th><th>狀態</th></tr>
        </thead>
        <tbody id="grade-tbody">
          <tr><td colspan="7" class="table-empty">請先選擇作業/小考並點擊「載入成績表」</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- 確認 Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-header"><span>確認操作</span><button class="modal-close" onclick="document.getElementById('confirm-modal').classList.remove('open')">✕</button></div>
    <div class="modal-body"><p class="confirm-message"></p></div>
    <div class="modal-footer">
      <button class="btn btn-outline confirm-cancel">取消</button>
      <button class="btn btn-primary confirm-ok">確認</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script>
/* ===== 共用工具 ===== */
const TA_KEY='calcTA_currentUser';
function getCurrentTA(){return localStorage.getItem(TA_KEY)||null}
function setCurrentTA(n){localStorage.setItem(TA_KEY,n)}
function initTASelector(){
  const sel=document.getElementById('ta-select');if(!sel)return;
  const saved=getCurrentTA();if(saved)sel.value=saved;
  sel.addEventListener('change',()=>{setCurrentTA(sel.value);showToast('已切換為助教：'+sel.value,'info');updateTABadge()});
  updateTABadge();
}
function updateTABadge(){const b=document.getElementById('ta-badge');if(!b)return;b.textContent=getCurrentTA()||'未選擇'}
function showToast(msg,type='info',dur=3000){
  let c=document.getElementById('toast-container');
  const icons={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const t=document.createElement('div');t.className='toast '+type;
  t.innerHTML='<span>'+(icons[type]||'')+'</span><span>'+msg+'</span>';
  c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400)},dur);
}
function formatDate(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-')}
function exportCSV(rows,filename='export'){
  const esc=v=>{const s=String(v===null||v===undefined?'':v);return(s.includes(',')||s.includes('\n')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=rows.map(r=>r.map(esc).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.csv';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500);
}
async function apiGet(t,p={}){const qs=new URLSearchParams(p).toString();const url='tables/'+t+(qs?'?'+qs:'');const r=await fetch(url);if(!r.ok)throw new Error('GET '+url+' 失敗：'+r.status);return r.json()}
async function apiGetOne(t,id){const r=await fetch('tables/'+t+'/'+id);if(!r.ok)throw new Error('GET one 失敗：'+r.status);return r.json()}
async function apiPost(t,d){const r=await fetch('tables/'+t,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok){const tx=await r.text();throw new Error('POST 失敗：'+r.status+' '+tx)}return r.json()}
async function apiPut(t,id,d){const r=await fetch('tables/'+t+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error('PUT 失敗：'+r.status);return r.json()}

/* ===== 成績登記邏輯 ===== */
let allStudents=[],allGrades={},currentAssignment=null,gradeRowData=[];

document.addEventListener('DOMContentLoaded',async()=>{
  initTASelector();
  await loadAssignmentOptions();
  await loadAllStudents();
  const params=new URLSearchParams(location.search);
  const aid=params.get('assignment_id');
  if(aid){document.getElementById('assignment-select').value=aid;await loadGradeSheet()}
});

async function loadAssignmentOptions(){
  try{
    const res=await apiGet('assignments',{limit:200});
    const items=(res.data||[]).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    const sel=document.getElementById('assignment-select');
    sel.innerHTML='<option value="">— 請選擇 —</option>'+items.map(a=>`<option value="${a.id}">[${a.test_id}] ${a.title} (${a.type==='homework'?'作業':'小考'})</option>`).join('');
  }catch(e){showToast('載入作業清單失敗','error')}
}

async function loadAllStudents(){
  try{
    const res=await apiGet('students',{limit:500});
    allStudents=res.data||[];
    const classes=[...new Set(allStudents.map(s=>s.class_name).filter(Boolean))].sort();
    const clsSel=document.getElementById('class-filter');
    clsSel.innerHTML='<option value="">全部班級</option>'+classes.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  }catch{}
}

function onAssignmentChange(){
  document.getElementById('grade-table-card').style.display='none';
  document.getElementById('progress-section').style.display='none';
  document.getElementById('assignment-info-bar').style.display='none';
}

async function loadGradeSheet(){
  const ta=getCurrentTA();if(!ta){showToast('請先選擇助教身份','warning');return}
  const assignmentId=document.getElementById('assignment-select').value;
  if(!assignmentId){showToast('請先選擇作業/小考','warning');return}
  showLoading(true);
  try{
    currentAssignment=await apiGetOne('assignments',assignmentId);
    const gRes=await apiGet('grades',{limit:500});
    const grades=(gRes.data||[]).filter(g=>g.assignment_record_id===assignmentId);
    allGrades={};grades.forEach(g=>{allGrades[g.student_record_id]=g});
    showAssignmentInfo();buildRowData();renderGradeTable();
    document.getElementById('grade-table-card').style.display='';
    document.getElementById('progress-section').style.display='';
    updateProgress();
    document.getElementById('grade-table-card').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){showToast('載入失敗：'+e.message,'error')}
  finally{showLoading(false)}
}

function showAssignmentInfo(){
  const a=currentAssignment;
  const bar=document.getElementById('assignment-info-bar');bar.style.display='';
  bar.innerHTML=`<div class="assignment-info">
    <div><span class="info-label">代號 </span><span class="info-val"><span class="badge badge-primary">${a.test_id||'—'}</span></span></div>
    <div><span class="info-label">名稱 </span><span class="info-val">${a.title||'—'}</span></div>
    <div><span class="info-label">類型 </span><span class="info-val">${a.type==='homework'?'<span class="badge badge-success">作業</span>':'<span class="badge badge-warning">小考</span>'}</span></div>
    <div><span class="info-label">日期 </span><span class="info-val">${formatDate(a.date)}</span></div>
    <div><span class="info-label">滿分 </span><span class="info-val">${a.max_score??'—'} 分</span></div>
  </div>`;
  document.getElementById('grade-table-title').textContent=a.title+' — 成績輸入表（滿分 '+(a.max_score??'?')+' 分）';
}

function buildRowData(){
  const sorted=[...allStudents].sort((a,b)=>{
    const ca=a.class_name||'',cb=b.class_name||'';
    if(ca!==cb)return ca.localeCompare(cb);
    return(a.student_id||'').localeCompare(b.student_id||'');
  });
  gradeRowData=sorted.map(s=>{
    const ex=allGrades[s.id]||null;
    return{student:s,gradeId:ex?ex.id:null,score:ex?(ex.score??''):'',note:ex?(ex.note||''):'',dirty:false,saved:!!ex};
  });
}

function renderGradeTable(){
  const tbody=document.getElementById('grade-tbody');
  const cls=document.getElementById('class-filter').value;
  const kw=(document.getElementById('student-search').value||'').trim().toLowerCase();
  const rows=gradeRowData.filter(r=>{
    const mc=!cls||(r.student.class_name||'')===cls;
    const mk=!kw||(r.student.student_id||'').toLowerCase().includes(kw)||(r.student.name||'').toLowerCase().includes(kw);
    return mc&&mk;
  });
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" class="table-empty">沒有符合的學生</td></tr>';return}
  tbody.innerHTML=rows.map(r=>{
    const i=gradeRowData.indexOf(r);
    const sv=r.score===''||r.score===null?'':r.score;
    const st=r.dirty?'<span class="badge badge-warning">✏️ 未儲存</span>':r.saved?'<span class="badge badge-success">✅ 已儲存</span>':'<span class="badge" style="background:#eee;color:#888;">— 未填寫</span>';
    return`<tr id="row-${i}" class="${r.saved&&!r.dirty?'saved':''}">
      <td style="color:var(--text-muted);font-size:.8rem;">${rows.indexOf(r)+1}</td>
      <td><code>${r.student.student_id||'—'}</code></td>
      <td><strong>${r.student.name||'—'}</strong></td>
      <td>${r.student.class_name?'<span class="badge badge-primary">'+r.student.class_name+'</span>':'—'}</td>
      <td><input type="number" class="form-control score-input" id="score-${i}" value="${sv}" min="0" max="${currentAssignment?.max_score??9999}" placeholder="分數" onchange="markDirty(${i})" onkeydown="handleKey(event,${i},'score')" /></td>
      <td><input type="text" class="form-control note-input" id="note-${i}" value="${r.note||''}" placeholder="備註（選填）" onchange="markDirty(${i})" onkeydown="handleKey(event,${i},'note')" /></td>
      <td id="status-${i}">${st}</td>
    </tr>`;
  }).join('');
}

function markDirty(i){
  const r=gradeRowData[i];if(!r)return;
  const sEl=document.getElementById('score-'+i),nEl=document.getElementById('note-'+i);
  if(sEl)r.score=sEl.value===''?'':Number(sEl.value);
  if(nEl)r.note=nEl.value;
  r.dirty=true;
  const st=document.getElementById('status-'+i);
  if(st)st.innerHTML='<span class="badge badge-warning">✏️ 未儲存</span>';
}

function handleKey(e,i,field){
  if(e.key==='Enter'){e.preventDefault();markDirty(i);saveSingleGrade(i);const next=document.getElementById('score-'+(i+1));if(next)next.focus()}
}

async function saveSingleGrade(i){
  const ta=getCurrentTA();if(!ta){showToast('請先選擇助教身份','warning');return}
  const r=gradeRowData[i];if(!r||!r.dirty)return;
  const rowEl=document.getElementById('row-'+i);if(rowEl)rowEl.classList.add('saving');
  const data={student_record_id:r.student.id,assignment_record_id:currentAssignment.id,score:r.score===''?null:Number(r.score),note:r.note||'',graded_by:ta};
  try{
    let saved;
    if(r.gradeId){saved=await apiPut('grades',r.gradeId,data)}
    else{saved=await apiPost('grades',data);r.gradeId=saved.id}
    r.dirty=false;r.saved=true;r.score=saved.score;r.note=saved.note;
    allGrades[r.student.id]=saved;
    if(rowEl){rowEl.classList.remove('saving');rowEl.classList.add('saved')}
    const st=document.getElementById('status-'+i);
    if(st)st.innerHTML='<span class="badge badge-success">✅ 已儲存</span>';
    updateProgress();
  }catch(e){
    if(rowEl){rowEl.classList.remove('saving');rowEl.classList.add('error')}
    showToast('儲存失敗（'+r.student.name+'）：'+e.message,'error');
  }
}

async function saveAllGrades(){
  const ta=getCurrentTA();if(!ta){showToast('請先選擇助教身份','warning');return}
  gradeRowData.forEach((r,i)=>{
    const sEl=document.getElementById('score-'+i),nEl=document.getElementById('note-'+i);
    if(sEl){const v=sEl.value===''?'':Number(sEl.value);if(v!==r.score){r.score=v;r.dirty=true}}
    if(nEl){const v=nEl.value;if(v!==r.note){r.note=v;r.dirty=true}}
  });
  const dirty=gradeRowData.map((r,i)=>({r,i})).filter(({r})=>r.dirty);
  if(!dirty.length){showToast('沒有需要儲存的變更','info');return}
  showLoading(true);let ok=0,err=0;
  for(const{i}of dirty){try{await saveSingleGrade(i);ok++}catch{err++}}
  showLoading(false);
  if(!err)showToast('已成功儲存 '+ok+' 筆成績','success');
  else showToast('成功 '+ok+' 筆，失敗 '+err+' 筆','warning');
  updateProgress();
}

function updateProgress(){
  const total=gradeRowData.length;
  const filled=gradeRowData.filter(r=>r.saved&&r.score!==''&&r.score!==null).length;
  const pct=total>0?Math.round(filled/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent='已登記 '+filled+' / '+total+' 人（'+pct+'%）';
}

function exportCurrentGrades(){
  if(!currentAssignment){showToast('請先載入成績表','warning');return}
  const h=['學號','姓名','班級','分數','備註','登記助教'];
  const rows=[h,...gradeRowData.map(r=>[r.student.student_id,r.student.name,r.student.class_name,r.score===''?'':r.score,r.note,allGrades[r.student.id]?.graded_by||''])];
  exportCSV(rows,currentAssignment.test_id+'_成績');showToast('已匯出成績 CSV','success');
}
function showLoading(show){document.getElementById('loading').classList.toggle('show',show)}
</script>
</body>
